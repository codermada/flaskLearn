<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://cdn.socket.io/4.8.3/socket.io.min.js" integrity="sha384-kzavj5fiMwLKzzD1f8S7TeoVIEi7uKHvbTA3ueZkrzYq75pNQUiUi6Dy98Q3fxb0" crossorigin="anonymous"></script>
</head>
<body>
    <div id="landing">
        <input type="text" id="username" placeholder="Enter your username">
        <button id="join-btn">Join Chat</button>
    </div>
    <div id="chat" style="display:none;">
        <ul id="messages">

        </ul>
        <input type="text" id="message-input" placeholder="Type a message">
        <button id="send-btn">Send</button>

    </div>
    <script>
        const socket = io({autoConnect: false});
        document.getElementById('join-btn').addEventListener('click', () => {
            const username = document.getElementById('username').value;
            if (username) {
                socket.connect();
                document.getElementById('landing').style.display = 'none';
                document.getElementById('chat').style.display = 'block';
                socket.on('connect', function() {
                    socket.emit('user_join', {'username': username});
                });
            }
        });
        document.getElementById('send-btn').addEventListener('click', () => {
            const message = document.getElementById('message-input').value;
            if (message) {
                socket.emit('send_message', {'message': message, 'username': document.getElementById('username').value});
                document.getElementById('message-input').value = '';
            }
        });
        socket.on('chat', function(data) {
            let ul = document.getElementById('messages');
            let li = document.createElement('li');
            li.textContent = `${data.username}: ${data.message}`;
            ul.appendChild(li);
            ul.scrollTop = ul.scrollHeight;
        });
    </script>
</body>
</html>
